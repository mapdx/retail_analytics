name: 'retail_analytics'
version: '1.0.0'

# dbt uses this profile name to find connection settings in ~/.dbt/profiles.yml
profile: 'retail_analytics'

# File path configuration — standard dbt project structure
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Folders removed by dbt clean
clean-targets:
  - "target"
  - "dbt_packages"

# Materialization defaults by layer
# staging models build as views — lightweight, no storage
# marts models build as tables — materialized, query-ready
models:
  retail_analytics:
    staging:
      +materialized: view
    marts:
      +materialized: table
